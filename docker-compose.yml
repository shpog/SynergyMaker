version: '3.8'

services:
  neo4j:
    image: neo4j:5-community
    container_name: synergymaker_db
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password123
    volumes:
      - neo4j_data:/data

  app:
    build: .
    container_name: synergymaker_app
    ports:
      - "3000:3000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
      - PORT=3000
    depends_on:
      - neo4j

volumes:
  neo4j_data: